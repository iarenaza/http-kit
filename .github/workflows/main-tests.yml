name: Main tests
on: [push, pull_request]

jobs:
  tests:
    strategy:
      matrix:
        java: ['17', '21', '25']
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: ${{ matrix.java }}

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          lein: latest

      - uses: actions/cache@v5
        id: cache-deps
        with:
          path: ~/.m2/repository
          key: deps-${{ hashFiles('project.clj') }}
          restore-keys: deps-

      - run: lein test-ci
